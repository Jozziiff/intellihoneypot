{% extends "base.html" %}
{% block title %}Credentials — IntelliHoneypot{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">Captured Credentials</h5>
    <span class="badge bg-danger" id="cred-count">0</span>
</div>

<div class="card">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th class="ps-3">Timestamp (UTC)</th>
                    <th>IP Address</th>
                    <th>Service</th>
                    <th>Method</th>
                    <th>Username</th>
                    <th>Password</th>
                </tr>
            </thead>
            <tbody id="creds-tbody">
                <tr><td colspan="6" class="text-center text-muted py-4">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function refresh() {
    const creds = await fetch('/api/credentials').then(r => r.json());
    document.getElementById('cred-count').textContent = creds.length;
    const tbody = document.getElementById('creds-tbody');
    if (creds.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">No credentials captured yet</td></tr>';
        return;
    }
    const svcBadge = (s) => `<span class="badge ${s === 'ssh' ? 'bg-info' : 'bg-warning text-dark'}">${s.toUpperCase()}</span>`;
    tbody.innerHTML = creds.map(c => `
        <tr>
            <td class="ps-3 small text-muted">${new Date(c.timestamp).toISOString().replace('T',' ').slice(0,19)}</td>
            <td><code>${c.attacker_ip}</code></td>
            <td>${svcBadge(c.service)}</td>
            <td class="small">${c.method}</td>
            <td><code class="text-info">${escapeHtml(c.username)}</code></td>
            <td><code class="text-warning">${escapeHtml(c.password)}</code></td>
        </tr>
    `).join('');
}
function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
refresh();
setInterval(refresh, 15000);
</script>
{% endblock %}
