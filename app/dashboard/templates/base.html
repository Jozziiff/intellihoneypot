<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IntelliHoneypot Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { background: #0f1117; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; }
        .navbar { background: #1a1d2e !important; border-bottom: 1px solid #2d3148; }
        .navbar-brand { color: #60a5fa !important; font-weight: 600; letter-spacing: 0.5px; }
        .nav-link { color: #94a3b8 !important; }
        .nav-link:hover, .nav-link.active { color: #60a5fa !important; }
        .card { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 8px; }
        .card-header { background: #242740; border-bottom: 1px solid #2d3148; font-weight: 500; }
        .stat-card { text-align: center; padding: 24px 16px; }
        .stat-card .value { font-size: 2.5rem; font-weight: 700; line-height: 1; }
        .stat-card .label { color: #94a3b8; font-size: 0.85rem; margin-top: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-RECON { background: #1d4ed8; }
        .badge-BRUTE_FORCE { background: #d97706; }
        .badge-EXPLOITATION { background: #dc2626; }
        .badge-PERSISTENCE { background: #7c3aed; }
        .table { color: #e2e8f0; }
        .table td, .table th { border-color: #2d3148; }
        .table thead th { color: #94a3b8; font-weight: 500; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .phase-badge { padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
        code { color: #86efac; background: #0f2720; padding: 2px 6px; border-radius: 3px; }
        .text-muted { color: #64748b !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f1117; }
        ::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 3px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid px-4">
        <span class="navbar-brand">
            &#x1F41D; IntelliHoneypot
        </span>
        <div class="navbar-nav ms-auto">
            <a class="nav-link {% if active == 'overview' %}active{% endif %}" href="/">Overview</a>
            <a class="nav-link {% if active == 'sessions' %}active{% endif %}" href="/sessions">Sessions</a>
            <a class="nav-link {% if active == 'credentials' %}active{% endif %}" href="/credentials">Credentials</a>
        </div>
        <span class="ms-3 text-muted" style="font-size:0.8rem;" id="clock"></span>
    </div>
</nav>

<div class="container-fluid px-4 py-4">
    {% block content %}{% endblock %}
</div>

<script>
    // Live clock
    function updateClock() {
        document.getElementById('clock').textContent = new Date().toUTCString().replace('GMT', 'UTC');
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
