{% extends "base.html" %}
{% block title %}Signed Out — IntelliHoneypot{% endblock %}

{% block content %}

    <div class="card p-4 p-md-5 text-center" style="max-width: 520px; width: 100%; border-radius: 18px;">
        <div class="display-4 mb-3">🔒</div>
        <h1 class="mb-2">Signed out</h1>
        <p class="text-muted mb-4">
            Your admin session has been cleared. You can sign back in whenever you're ready.
        </p>
        <div class="d-flex flex-column flex-sm-row gap-2 justify-content-center">
            <a class="btn btn-primary px-4" href="/login">Back to login</a>
            <a class="btn btn-outline-light px-4" href="/">Dashboard home</a>
        </div>
    </div>
</div>
{% endblock %}
