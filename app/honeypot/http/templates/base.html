<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Acme Corp VPN Portal{% endblock %}</title>
    <link rel="stylesheet" href="/global-protect/portal/css/login.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #1a2332; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { width: 420px; background: #ffffff; border-radius: 6px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); overflow: hidden; }
        .header { background: #0070d1; padding: 28px 32px; text-align: center; }
        .header img { width: 48px; margin-bottom: 10px; }
        .header h1 { color: white; font-size: 18px; font-weight: 400; }
        .header p { color: rgba(255,255,255,0.75); font-size: 13px; margin-top: 4px; }
        .body { padding: 32px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; }
        input[type=text], input[type=password] { width: 100%; padding: 10px 12px; border: 1px solid #d0d5dd; border-radius: 4px; font-size: 14px; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: #0070d1; box-shadow: 0 0 0 3px rgba(0,112,209,0.1); }
        .btn { width: 100%; padding: 11px; background: #0070d1; color: white; border: none; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 8px; }
        .btn:hover { background: #0058a3; }
        .alert { padding: 10px 14px; border-radius: 4px; font-size: 13px; margin-bottom: 16px; }
        .alert-info { background: #e8f4fd; border: 1px solid #b8d9f5; color: #1a5f9a; }
        .footer { padding: 16px 32px; border-top: 1px solid #f0f0f0; text-align: center; font-size: 11px; color: #999; }
    </style>
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
