persona:
  os: "Ubuntu 20.04.6 LTS"
  kernel: "5.4.0-182-generic"
  hostname: "ubuntu-server"
  arch: "x86_64"
  default_user: "admin"
  home_dir: "/home/admin"

banner: "Ubuntu 20.04.6 LTS \\n \\l\n"

motd: |
  Welcome to Ubuntu 20.04.6 LTS (GNU/Linux 5.4.0-182-generic x86_64)

   * Documentation:  https://help.ubuntu.com
   * Management:     https://landscape.canonical.com
   * Support:        https://ubuntu.com/advantage

  System information as of {datetime}

    System load:  0.12               Processes:             142
    Usage of /:   41.3% of 19.21GB   Users logged in:       0
    Memory usage: 38%                IPv4 address for eth0: 10.0.1.10
    Swap usage:   0%

  0 updates can be applied immediately.

  Last login: {last_login} from {last_ip}

prompt_template: "{username}@{hostname}:{cwd}$ "

static_responses:
  whoami: "{username}"
  hostname: "ubuntu-server"
  uname:
    "-a": "Linux ubuntu-server 5.4.0-182-generic #202-Ubuntu SMP Fri Apr 26 12:29:36 UTC 2024 x86_64 x86_64 x86_64 GNU/Linux"
    "-r": "5.4.0-182-generic"
    "-s": "Linux"
    "-n": "ubuntu-server"
    "-m": "x86_64"
    "": "Linux"
  id: "uid=1000({username}) gid=1000({username}) groups=1000({username}),27(sudo),4(adm)"
  env: |
    SHELL=/bin/bash
    TERM=xterm-256color
    USER={username}
    LS_COLORS=rs=0:di=01;34:ln=01;36:mh=00:pi=40;33
    PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/games:/usr/local/games:/snap/bin
    PWD={cwd}
    HOME=/home/admin
    LOGNAME={username}
    LESSOPEN=| /usr/bin/lesspipe %s
    LESSCLOSE=/usr/bin/lesspipe %s %s
  uptime: " {time} up {updays} days, {uphours}:{upmins}, 1 user, load average: 0.12, 0.08, 0.05"
  df:
